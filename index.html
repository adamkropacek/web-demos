function render() {
  const q      = document.getElementById('search').value.toLowerCase();
  const prio   = document.getElementById('filtr-priorita').value;
  const lok    = document.getElementById('filtr-lokace').value;
  const kont   = document.getElementById('filtr-kontakt').value;

  const filtered = DATA.filter(r => {
    if (prio && r.priorita !== prio) return false;
    if (lok  && r.lokace   !== lok)  return false;
    if (kont === 'email'  && !r.email) return false;
    if (kont === 'web'    && !r.web)   return false;
    if (kont === 'noweb'  &&  r.web)   return false;
    if (q && !JSON.stringify(r).toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('pocet').textContent = `${filtered.length} leadů`;

  const html = filtered.map(r => {
    const cls   = r.priorita === 'HIGH' ? 'high' : 'med';
    const badge = r.priorita === 'HIGH'
      ? '<span class="badge-high text-xs font-bold px-2 py-0.5 rounded">HIGH</span>'
      : '<span class="badge-med text-xs font-bold px-2 py-0.5 rounded">MED</span>';
    const scoreCls = r.priorita === 'HIGH' ? 'score-high' : 'score-med';

    const webLink = r.web
      ? `<a href="${r.web}" target="_blank" rel="noopener">${r.web.replace(/^https?:\/\//, '')}</a>`
      : '<span class="text-slate-500 italic">bez webu</span>';

    const tel = r.telefon
      ? `<a class="kontakt-btn" href="tel:${r.telefon.replace(/\s/g,'')}">${r.telefon}</a>`
      : '';
    const email = r.email
      ? `<a class="kontakt-btn" href="mailto:${r.email}">${r.email}</a>`
      : '';

    const duvody = r.duvody.split(';').filter(Boolean).map(d =>
      `<span class="tag">${d.trim()}</span>`
    ).join('');

    const ps = r.pagespeed ? `<span class="tag">PS: ${r.pagespeed}</span>` : '';

    return `<div class="card ${cls}">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            ${badge}
            <span class="${scoreCls} text-lg">${r.score}</span>
            <span class="font-semibold text-white truncate">${r.nazev}</span>
          </div>
          <div class="text-sm text-slate-400 mb-2">
            ${r.lokace} &nbsp;·&nbsp; ${r.kategorie}${r.adresa ? ' &nbsp;·&nbsp; ' + r.adresa : ''}
          </div>
          <div class="text-sm mb-2">${webLink}</div>
          <div class="mb-1">${duvody}${ps}</div>
        </div>
        <div class="flex flex-col gap-1 items-end shrink-0">
          ${tel}
          ${email}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('list').innerHTML = html || '<p class="text-slate-500 text-center py-12">Žádné výsledky</p>';
}

render();
